name: Build and Release Debug APK

on:
  push:
    tags:
      - 'v*' # Triggers on any tag starting with 'v', e.g., v1.0, v2.1.3
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag for the release (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-and-release:
    name: Build Debug APK and Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.12'

      - name: Decode Keystore
        run: |
          if [ -f "debug.keystore.base64" ]; then
            echo "Decoding debug.keystore.base64 to debug.keystore"
            base64 -d debug.keystore.base64 > debug.keystore
          fi

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Determine Release Tag
        id: get_tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "TAG_NAME=${{ github.event.inputs.release_tag }}" >> $GITHUB_ENV
          else
            echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Release ${{ env.TAG_NAME }}
          files: app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
